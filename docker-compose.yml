services:

  trainer:
    build:
      context: ..
      dockerfile: Cassandra.jl/Dockerfile.julia
    command: julia --project=. scripts/train.jl
    environment:
      - CHECKPOINTS_DIR=/data/checkpoints
      - LOGS_DIR=/data/logs
    volumes:
      - checkpoints:/data/checkpoints
      - logs:/data/logs
      - ./data:/app/data
    networks:
      - internal
    restart: "no"

  bot:
    build:
      context: ..
      dockerfile: Cassandra.jl/Dockerfile.julia
    command: julia --project=. bot/main.jl
    environment:
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - CHECKPOINTS_DIR=/data/checkpoints
      - LOGS_DIR=/data/logs
      - BOT_CONTROL_PORT=8080
    volumes:
      - checkpoints:/data/checkpoints
      - logs:/data/logs
    networks:
      - internal
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - PORT=8000
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - CHECKPOINTS_DIR=/data/checkpoints
      - LOGS_DIR=/data/logs
      - BOT_CONTROL_URL=http://bot:8080
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-}
      - TRAINER_IMAGE=cassandrajl-trainer
      - COMPOSE_PROJECT=cassandrajl
      - DATA_DIR_HOST=${PWD}/data
    volumes:
      - checkpoints:/data/checkpoints
      - logs:/data/logs
      - ./data:/app/data:ro
      - ./dashboard:/app/dashboard:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - internal
    restart: unless-stopped

volumes:
  checkpoints:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/checkpoints
  logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/logs

networks:
  internal:
    driver: bridge
