services:
    arena:
        profiles: [arena]
        build:
            context: ..
            dockerfile: Cassandra.jl/arena/Dockerfile
        command: python3 /app/arena/match.py
        environment:
            - STOCKFISH_ELO=${STOCKFISH_ELO:-1500}
            - GAMES=${GAMES:-100}
            - MOVE_TIME=${MOVE_TIME:-1.0}
            - SETUPS_DIR=/data/setups
            - LOGS_DIR=/data/logs
        volumes:
            - setups:/data/setups
            - logs:/data/logs
        networks:
            - internal
        restart: "no"

    bot:
        build:
            context: ..
            dockerfile: Cassandra.jl/Dockerfile.julia
        command: julia --project=. bot/main.jl
        environment:
            - LICHESS_TOKEN=${LICHESS_TOKEN}
            - LOGS_DIR=/data/logs
            - SETUPS_DIR=/data/setups
            - BOT_CONTROL_PORT=8080
        volumes:
            - logs:/data/logs
            - setups:/data/setups
        networks:
            - internal
        restart: unless-stopped

    dashboard:
        build:
            context: .
            dockerfile: Dockerfile.dashboard
        environment:
            - PORT=8000
            - LICHESS_TOKEN=${LICHESS_TOKEN}
            - LOGS_DIR=/data/logs
            - SETUPS_DIR=/data/setups
            - BOT_CONTROL_URL=http://bot:8080
            - DASHBOARD_SECRET=${DASHBOARD_SECRET:-}
            - ARENA_IMAGE=cassandrajl-arena
            - COMPOSE_PROJECT=cassandrajl
        volumes:
            - logs:/data/logs
            - setups:/data/setups
            - ./dashboard:/app/dashboard:ro
            - /var/run/docker.sock:/var/run/docker.sock
            - /sys/class/thermal:/sys/class/thermal:ro
        ports:
            - "8000:8000"
        networks:
            - internal
        restart: unless-stopped

volumes:
    logs:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ${PWD}/logs
    setups:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ${PWD}/setups

networks:
    internal:
        driver: bridge
